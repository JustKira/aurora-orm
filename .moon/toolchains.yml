$schema: "https://moonrepo.dev/schemas/toolchain.json"

javascript:
  packageManager: bun
  installDependencies: true

bun:
  version: "1.3.11"

rust:
  version: "1.94.0"
  components:
    - clippy
    - rustfmt
  syncToolchainConfig: true

unstable_python:
  packageManager: 'uv'
  version: '3.13.12'

unstable_uv:
  version: '0.11.3'
