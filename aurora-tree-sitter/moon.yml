$schema: 'https://moonrepo.dev/schemas/project.json'

id: aurora-tree-sitter
language: javascript

tasks:
  # Regenerate src/parser.c + src/grammar.json from grammar.js.
  # Run after editing grammar.js.
  generate:
    command: bunx
    args: ['tree-sitter', 'generate']
    inputs:
      - 'grammar.js'
    outputs:
      - 'src/parser.c'
      - 'src/grammar.json'
      - 'src/node-types.json'

  # Run the corpus tests in test/corpus/*.txt against the generated parser.
  test:
    command: bunx
    args: ['tree-sitter', 'test']
    inputs:
      - 'grammar.js'
      - 'src/**/*'
      - 'test/corpus/**/*'
    deps:
      - 'generate'

  # Parse a file with the generated grammar. Pass the file after `--`.
  parse:
    command: bunx
    args: ['tree-sitter', 'parse']
    inputs:
      - 'grammar.js'
      - 'src/**/*'
      - 'examples/**/*'
    deps:
      - 'generate'
