name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example vX.Y.Z"
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  gate:
    name: Release Gate
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      should_publish: ${{ steps.gate.outputs.should_publish }}
      tag: ${{ steps.gate.outputs.tag }}
      version: ${{ steps.gate.outputs.version }}
      release_sha: ${{ steps.gate.outputs.release_sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release gate
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch --force --tags origin '+refs/heads/main:refs/remotes/origin/main'

          should_publish=false
          tag=""
          release_sha=""

          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            if [[ "$WORKFLOW_RUN_CONCLUSION" != "success" ]]; then
              echo "CI workflow completed with conclusion=${WORKFLOW_RUN_CONCLUSION}; no release."
              {
                echo "should_publish=false"
                echo "tag="
                echo "version="
                echo "release_sha="
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi

            release_sha="$WORKFLOW_RUN_SHA"
            tag="$(git tag --points-at "$release_sha" --list 'v*' | sort -V | tail -n 1)"
            if [[ -z "$tag" ]]; then
              echo "No v* tag points at successful CI commit ${release_sha}; no release."
              {
                echo "should_publish=false"
                echo "tag="
                echo "version="
                echo "release_sha=${release_sha}"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$INPUT_TAG"
            release_sha="$(git rev-list -n 1 "${tag}^{commit}")"
          else
            tag="$REF_NAME"
            release_sha="$(git rev-list -n 1 "${tag}^{commit}")"
          fi

          version="${tag#v}"
          if [[ "$tag" == "$version" || -z "$version" ]]; then
            echo "Release tags must start with v, for example vX.Y.Z." >&2
            exit 1
          fi

          echo "Release tag ${tag} resolves to ${release_sha}."

          if ! git merge-base --is-ancestor "$release_sha" origin/main; then
            echo "Release commit ${release_sha} is not contained on origin/main." >&2
            exit 1
          fi

          if [[ "$EVENT_NAME" != "workflow_run" ]]; then
            runs_json="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --branch main \
              --commit "$release_sha" \
              --limit 20 \
              --json status,conclusion,databaseId,url)"

            completed_success="$(jq -r '[.[] | select(.status == "completed" and .conclusion == "success")] | first | .databaseId // empty' <<< "$runs_json")"
            if [[ -z "$completed_success" ]]; then
              latest_run="$(jq -r '[.[]] | first | .url // empty' <<< "$runs_json")"
              if [[ -n "$latest_run" ]]; then
                echo "No successful main CI run exists yet for ${release_sha}. Latest related run: ${latest_run}" >&2
              else
                echo "No main CI run exists yet for ${release_sha}." >&2
              fi
              echo "Wait for main CI to pass for this commit, then rerun release." >&2
              exit 1
            fi

            echo "Found successful CI run ${completed_success} for ${release_sha}."
          fi

          should_publish=true
          {
            echo "should_publish=${should_publish}"
            echo "tag=${tag}"
            echo "version=${version}"
            echo "release_sha=${release_sha}"
          } >> "$GITHUB_OUTPUT"

  validate-version:
    name: Validate Release Version
    needs: gate
    if: needs.gate.outputs.should_publish == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5

    steps:
      - name: Check out tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.gate.outputs.tag }}
          fetch-depth: 0

      - name: Validate tag matches repo versions
        env:
          TAG: ${{ needs.gate.outputs.tag }}
          VERSION: ${{ needs.gate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          expected="version = \"$VERSION\""
          files=(
            Cargo.toml
            aureline-cli/Cargo.toml
            aureline-codegen/Cargo.toml
            aureline-config/Cargo.toml
            aureline-core/Cargo.toml
            aureline-lsp/Cargo.toml
            aureline-migrate/Cargo.toml
          )

          for file in "${files[@]}"; do
            if ! grep -Fq "$expected" "$file"; then
              echo "$file does not contain $expected" >&2
              exit 1
            fi
          done

          dependency_pin="version = \"=$VERSION\""
          for crate in aureline-codegen aureline-config aureline-core aureline-migrate; do
            if ! grep -F "$crate = " Cargo.toml | grep -Fq "$dependency_pin"; then
              echo "Cargo.toml dependency pin for $crate does not match =$VERSION" >&2
              exit 1
            fi
          done

          node_version="\"version\": \"$VERSION\""
          for file in package.json aureline-tree-sitter/package.json; do
            if ! grep -Fq "$node_version" "$file"; then
              echo "$file does not contain $node_version" >&2
              exit 1
            fi
          done

  build-cli-assets:
    name: Build CLI Asset (${{ matrix.target }})
    needs: [gate, validate-version]
    if: needs.gate.outputs.should_publish == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: blacksmith-8vcpu-ubuntu-2404
            archive_ext: tar.gz
            binary_name: aureline
            needs_musl_tools: true
          - target: x86_64-unknown-linux-gnu
            runner: blacksmith-8vcpu-ubuntu-2404
            archive_ext: tar.gz
            binary_name: aureline
            needs_musl_tools: false
          - target: aarch64-unknown-linux-musl
            runner: blacksmith-8vcpu-ubuntu-2404-arm
            archive_ext: tar.gz
            binary_name: aureline
            needs_musl_tools: true
          - target: aarch64-apple-darwin
            runner: blacksmith-6vcpu-macos-15
            archive_ext: tar.gz
            binary_name: aureline
            needs_musl_tools: false
          - target: x86_64-pc-windows-msvc
            runner: blacksmith-8vcpu-windows-2025
            archive_ext: zip
            binary_name: aureline.exe
            needs_musl_tools: false

    steps:
      - name: Check out tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.gate.outputs.tag }}
          fetch-depth: 0

      - name: Setup Moon Toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          cache-base: main

      - name: Setup Rust Toolchain and Release Cache
        uses: moonrepo/setup-rust@v1
        with:
          inherit-toolchain: true
          cache-base: main
          cache-target: release

      - name: Install musl tools
        if: runner.os == 'Linux' && matrix.needs_musl_tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Add Rust target (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: rustup target add "${{ matrix.target }}"

      - name: Add Rust target (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: rustup target add "${{ matrix.target }}"

      - name: Build CLI release binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: cargo build --package aureline-cli --release --locked --target "${{ matrix.target }}"

      - name: Build CLI release binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo build --package aureline-cli --release --locked --target "${{ matrix.target }}"

      - name: Smoke-test native binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: "target/${{ matrix.target }}/release/${{ matrix.binary_name }} --help >/dev/null"

      - name: Smoke-test native binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: '& "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" --help | Out-Null'

      - name: Package and verify archive (Unix)
        if: runner.os != 'Windows'
        env:
          VERSION: ${{ needs.gate.outputs.version }}
          TARGET: ${{ matrix.target }}
          BINARY_NAME: ${{ matrix.binary_name }}
        shell: bash
        run: |
          set -euo pipefail
          package_dir="$RUNNER_TEMP/aureline-${TARGET}"
          rm -rf "$package_dir"
          mkdir -p "$package_dir" dist
          cp "target/${TARGET}/release/${BINARY_NAME}" "$package_dir/${BINARY_NAME}"
          chmod +x "$package_dir/${BINARY_NAME}"

          archive="dist/aureline-${VERSION}-${TARGET}.tar.gz"
          tar -C "$package_dir" -czf "$archive" "$BINARY_NAME"

          mapfile -t entries < <(tar -tzf "$archive")
          if [[ "${#entries[@]}" -ne 1 || "${entries[0]}" != "$BINARY_NAME" ]]; then
            printf 'unexpected archive contents:\n' >&2
            printf '%s\n' "${entries[@]}" >&2
            exit 1
          fi

      - name: Package and verify archive (Windows)
        if: runner.os == 'Windows'
        env:
          VERSION: ${{ needs.gate.outputs.version }}
          TARGET: ${{ matrix.target }}
          BINARY_NAME: ${{ matrix.binary_name }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $packageDir = Join-Path $env:RUNNER_TEMP "aureline-$env:TARGET"
          Remove-Item -Recurse -Force $packageDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $packageDir, 'dist' | Out-Null
          Copy-Item "target/$env:TARGET/release/$env:BINARY_NAME" (Join-Path $packageDir $env:BINARY_NAME)

          $archive = "dist/aureline-$env:VERSION-$env:TARGET.zip"
          Remove-Item -Force $archive -ErrorAction SilentlyContinue
          Compress-Archive -Path (Join-Path $packageDir $env:BINARY_NAME) -DestinationPath $archive

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $archive))
          try {
            $entries = @($zip.Entries | ForEach-Object { $_.FullName })
          } finally {
            $zip.Dispose()
          }
          if ($entries.Count -ne 1 -or $entries[0] -ne $env:BINARY_NAME) {
            Write-Error "Unexpected archive contents: $($entries -join ', ')"
          }

      - name: Smoke-test installer from local mirror (Unix)
        if: runner.os != 'Windows'
        env:
          TAG: ${{ needs.gate.outputs.tag }}
          VERSION: ${{ needs.gate.outputs.version }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          download_root="$RUNNER_TEMP/aureline-download"
          mkdir -p "$download_root/$TAG"
          cp "dist/aureline-${VERSION}-${TARGET}.tar.gz" "$download_root/$TAG/"

          install_dir="$RUNNER_TEMP/aureline-install-${TARGET}"
          rm -rf "$install_dir"
          AURELINE_DOWNLOAD_ROOT="file://$download_root" \
            AURELINE_TARGET="$TARGET" \
            INSTALL_DIR="$install_dir" \
            VERSION="$VERSION" \
            sh aureline-docs/public/install.sh
          "$install_dir/aureline" --help >/dev/null

      - name: Smoke-test installer from local mirror (Windows)
        if: runner.os == 'Windows'
        env:
          TAG: ${{ needs.gate.outputs.tag }}
          VERSION: ${{ needs.gate.outputs.version }}
          TARGET: ${{ matrix.target }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $downloadRoot = Join-Path $env:RUNNER_TEMP 'aureline-download'
          $tagDir = Join-Path $downloadRoot $env:TAG
          New-Item -ItemType Directory -Force $tagDir | Out-Null
          Copy-Item "dist/aureline-$env:VERSION-$env:TARGET.zip" $tagDir

          $installDir = Join-Path $env:RUNNER_TEMP "aureline-install-$env:TARGET"
          Remove-Item -Recurse -Force $installDir -ErrorAction SilentlyContinue
          pwsh aureline-docs/public/install.ps1 -DownloadRoot $downloadRoot -Target $env:TARGET -InstallDir $installDir -Version $env:VERSION
          & (Join-Path $installDir 'aureline.exe') --help | Out-Null

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aureline-${{ matrix.target }}
          path: dist/aureline-${{ needs.gate.outputs.version }}-${{ matrix.target }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  publish-crates-and-release:
    name: Publish Crates and Release
    needs: [gate, build-cli-assets]
    if: needs.gate.outputs.should_publish == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 35

    steps:
      - name: Check out tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.gate.outputs.tag }}
          fetch-depth: 0

      - name: Setup Moon Toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          cache-base: main

      - name: Setup Rust Toolchain and Release Cache
        uses: moonrepo/setup-rust@v1
        with:
          inherit-toolchain: true
          cache-base: main
          cache-target: release

      - name: Check published artifacts
        id: published
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.gate.outputs.tag }}
          VERSION: ${{ needs.gate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          crate_exists() {
            local crate="$1"
            curl --fail --silent --show-error \
              "https://crates.io/api/v1/crates/${crate}/${VERSION}" \
              >/dev/null 2>&1
          }

          missing=()
          for crate in aureline-core aureline-config aureline-migrate aureline-codegen aureline-lsp aureline-cli; do
            if crate_exists "$crate"; then
              echo "${crate} ${VERSION} already exists on crates.io."
            else
              echo "${crate} ${VERSION} is missing from crates.io."
              missing+=("$crate")
            fi
          done

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            github_release_exists=true
            echo "GitHub release ${TAG} already exists."
          else
            github_release_exists=false
            echo "GitHub release ${TAG} does not exist yet."
          fi

          missing_crates="${missing[*]}"
          {
            echo "missing_crates=${missing_crates}"
            echo "github_release_exists=${github_release_exists}"
          } >> "$GITHUB_OUTPUT"

          if [[ "$github_release_exists" == "true" ]]; then
            echo "GitHub release ${TAG} already exists; release creation will be skipped, but binary assets will still be rebuilt and uploaded."
          fi

      - name: Publish missing crates.io packages
        if: steps.published.outputs.missing_crates != ''
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ needs.gate.outputs.version }}
          MISSING_CRATES: ${{ steps.published.outputs.missing_crates }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "CARGO_REGISTRY_TOKEN secret is required to publish crates." >&2
            exit 1
          fi

          crate_exists() {
            local crate="$1"
            curl --fail --silent --show-error \
              "https://crates.io/api/v1/crates/${crate}/${VERSION}" \
              >/dev/null 2>&1
          }

          publish_crate() {
            local crate="$1"
            if crate_exists "$crate"; then
              echo "${crate} ${VERSION} already exists on crates.io; skipping."
              return
            fi

            for attempt in 1 2 3 4 5; do
              publish_log="$(mktemp)"
              if cargo publish --package "$crate" --locked 2>&1 | tee "$publish_log"; then
                rm -f "$publish_log"
                return
              fi

              if grep -Fq "already exists on crates.io index" "$publish_log"; then
                echo "${crate} ${VERSION} already exists on crates.io; skipping."
                rm -f "$publish_log"
                return
              fi

              rm -f "$publish_log"

              if crate_exists "$crate"; then
                echo "${crate} ${VERSION} was published by a previous attempt."
                return
              fi

              if [[ "$attempt" == "5" ]]; then
                break
              fi

              echo "cargo publish failed for ${crate} on attempt ${attempt}; retrying after crates.io index propagation."
              sleep 30
            done

            echo "Failed to publish ${crate} ${VERSION} after 5 attempts." >&2
            exit 1
          }

          for crate in $MISSING_CRATES; do
            publish_crate "$crate"
          done

      - name: Create GitHub release
        if: steps.published.outputs.github_release_exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.gate.outputs.tag }}
          VERSION: ${{ needs.gate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          release_flags=()
          if [[ "$VERSION" == *"-"* ]]; then
            release_flags+=(--prerelease)
          fi

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag \
            "${release_flags[@]}"

  upload-cli-assets:
    name: Upload CLI Assets
    needs: [gate, publish-crates-and-release]
    if: needs.gate.outputs.should_publish == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10

    steps:
      - name: Download CLI workflow artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: aureline-*
          path: dist-download

      - name: Verify and upload CLI release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.gate.outputs.tag }}
          VERSION: ${{ needs.gate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find dist-download -maxdepth 3 -type f -exec cp {} dist/ \;

          expected=(
            "aureline-${VERSION}-x86_64-unknown-linux-musl.tar.gz"
            "aureline-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
            "aureline-${VERSION}-aarch64-unknown-linux-musl.tar.gz"
            "aureline-${VERSION}-aarch64-apple-darwin.tar.gz"
            "aureline-${VERSION}-x86_64-pc-windows-msvc.zip"
          )

          mapfile -t actual < <(find dist -maxdepth 1 -type f -printf '%f\n' | sort)
          mapfile -t want < <(printf '%s\n' "${expected[@]}" | sort)

          if [[ "${actual[*]}" != "${want[*]}" ]]; then
            echo "Expected release assets:" >&2
            printf '%s\n' "${want[@]}" >&2
            echo "Actual release assets:" >&2
            printf '%s\n' "${actual[@]}" >&2
            exit 1
          fi

          gh release upload "$TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
