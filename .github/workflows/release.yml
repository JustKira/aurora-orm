name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example vX.Y.Z"
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  gate:
    name: Release Gate
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      should_publish: ${{ steps.gate.outputs.should_publish }}
      tag: ${{ steps.gate.outputs.tag }}
      version: ${{ steps.gate.outputs.version }}
      release_sha: ${{ steps.gate.outputs.release_sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release gate
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch --force --tags origin '+refs/heads/main:refs/remotes/origin/main'

          should_publish=false
          tag=""
          release_sha=""

          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            release_sha="$WORKFLOW_RUN_SHA"
            tag="$(git tag --points-at "$release_sha" --list 'v*' | sort -V | tail -n 1)"

            if [[ "$WORKFLOW_RUN_CONCLUSION" != "success" ]]; then
              if [[ -n "$tag" ]]; then
                echo "CI workflow completed with conclusion=${WORKFLOW_RUN_CONCLUSION} for release tag ${tag} (${release_sha}); release blocked." >&2
                exit 1
              fi

              echo "CI workflow completed with conclusion=${WORKFLOW_RUN_CONCLUSION}; no release tag points at ${release_sha}."
              {
                echo "should_publish=false"
                echo "tag="
                echo "version="
                echo "release_sha=${release_sha}"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [[ -z "$tag" ]]; then
              echo "No v* tag points at successful CI commit ${release_sha}; no release."
              {
                echo "should_publish=false"
                echo "tag="
                echo "version="
                echo "release_sha=${release_sha}"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$INPUT_TAG"
            release_sha="$(git rev-list -n 1 "${tag}^{commit}")"
          else
            tag="$REF_NAME"
            release_sha="$(git rev-list -n 1 "${tag}^{commit}")"
          fi

          version="${tag#v}"
          if [[ "$tag" == "$version" || -z "$version" ]]; then
            echo "Release tags must start with v, for example vX.Y.Z." >&2
            exit 1
          fi

          echo "Release tag ${tag} resolves to ${release_sha}."

          if ! git merge-base --is-ancestor "$release_sha" origin/main; then
            echo "Release commit ${release_sha} is not contained on origin/main." >&2
            exit 1
          fi

          if [[ "$EVENT_NAME" != "workflow_run" ]]; then
            runs_json="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --branch main \
              --commit "$release_sha" \
              --limit 50 \
              --json status,conclusion,databaseId,url)"

            completed_success="$(jq -r '[.[] | select(.status == "completed" and .conclusion == "success")] | first | .databaseId // empty' <<< "$runs_json")"
            if [[ -n "$completed_success" ]]; then
              echo "Found successful CI run ${completed_success} for ${release_sha}."
            else
              active_run="$(jq -r '[.[] | select(.status != "completed")] | first | .url // empty' <<< "$runs_json")"
              active_status="$(jq -r '[.[] | select(.status != "completed")] | first | .status // empty' <<< "$runs_json")"
              latest_run="$(jq -r '[.[]] | first | .url // empty' <<< "$runs_json")"
              latest_status="$(jq -r '[.[]] | first | .status // empty' <<< "$runs_json")"
              latest_conclusion="$(jq -r '[.[]] | first | .conclusion // empty' <<< "$runs_json")"

              if [[ -n "$active_run" ]]; then
                echo "Main CI for ${release_sha} is still ${active_status}: ${active_run}"
                echo "This release run will not publish yet. The workflow_run trigger will publish ${tag} automatically if CI succeeds."
                {
                  echo "should_publish=false"
                  echo "tag=${tag}"
                  echo "version=${version}"
                  echo "release_sha=${release_sha}"
                } >> "$GITHUB_OUTPUT"
                exit 0
              fi

              if [[ -n "$latest_run" ]]; then
                echo "Main CI for ${release_sha} completed with conclusion=${latest_conclusion:-unknown}: ${latest_run}" >&2
                echo "Fix or rerun CI for this commit before publishing ${tag}." >&2
                exit 1
              fi

              echo "No main CI run is visible yet for ${release_sha}."
              echo "This release run will not publish yet. Push or rerun main CI for this commit; the workflow_run trigger will publish ${tag} automatically if CI succeeds."
              {
                echo "should_publish=false"
                echo "tag=${tag}"
                echo "version=${version}"
                echo "release_sha=${release_sha}"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          should_publish=true
          {
            echo "should_publish=${should_publish}"
            echo "tag=${tag}"
            echo "version=${version}"
            echo "release_sha=${release_sha}"
          } >> "$GITHUB_OUTPUT"

  validate-version:
    name: Validate Release Version
    needs: gate
    if: needs.gate.outputs.should_publish == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5

    steps:
      - name: Check out tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.gate.outputs.tag }}
          fetch-depth: 0

      - name: Validate tag matches repo versions
        env:
          TAG: ${{ needs.gate.outputs.tag }}
          VERSION: ${{ needs.gate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          expected="version = \"$VERSION\""
          files=(
            Cargo.toml
            aureline-cli/Cargo.toml
            aureline-codegen/Cargo.toml
            aureline-config/Cargo.toml
            aureline-core/Cargo.toml
            aureline-lsp/Cargo.toml
            aureline-migrate/Cargo.toml
          )

          for file in "${files[@]}"; do
            if ! grep -Fq "$expected" "$file"; then
              echo "$file does not contain $expected" >&2
              exit 1
            fi
          done

          dependency_pin="version = \"=$VERSION\""
          for crate in aureline-codegen aureline-config aureline-core aureline-migrate; do
            if ! grep -F "$crate = " Cargo.toml | grep -Fq "$dependency_pin"; then
              echo "Cargo.toml dependency pin for $crate does not match =$VERSION" >&2
              exit 1
            fi
          done

          node_version="\"version\": \"$VERSION\""
          for file in package.json aureline-tree-sitter/package.json; do
            if ! grep -Fq "$node_version" "$file"; then
              echo "$file does not contain $node_version" >&2
              exit 1
            fi
          done

  build-cli-assets:
    name: Build CLI Assets
    needs: [gate, validate-version]
    if: needs.gate.outputs.should_publish == 'true'
    uses: ./.github/workflows/cli-build.yml
    with:
      tag: ${{ needs.gate.outputs.tag }}
      version: ${{ needs.gate.outputs.version }}

  publish-crates-and-release:
    name: Publish Crates and Release
    needs: [gate, build-cli-assets]
    if: needs.gate.outputs.should_publish == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 35

    steps:
      - name: Check out tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.gate.outputs.tag }}
          fetch-depth: 0

      - name: Setup Moon Toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          cache-base: main

      - name: Setup Rust Toolchain and Release Cache
        uses: moonrepo/setup-rust@v1
        with:
          inherit-toolchain: true
          cache-base: main
          cache-target: release

      - name: Check published artifacts
        id: published
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.gate.outputs.tag }}
          VERSION: ${{ needs.gate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          crate_exists() {
            local crate="$1"
            curl --fail --silent --show-error \
              "https://crates.io/api/v1/crates/${crate}/${VERSION}" \
              >/dev/null 2>&1
          }

          missing=()
          for crate in aureline-core aureline-config aureline-migrate aureline-codegen aureline-lsp aureline-cli; do
            if crate_exists "$crate"; then
              echo "${crate} ${VERSION} already exists on crates.io."
            else
              echo "${crate} ${VERSION} is missing from crates.io."
              missing+=("$crate")
            fi
          done

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            github_release_exists=true
            echo "GitHub release ${TAG} already exists."
          else
            github_release_exists=false
            echo "GitHub release ${TAG} does not exist yet."
          fi

          missing_crates="${missing[*]}"
          {
            echo "missing_crates=${missing_crates}"
            echo "github_release_exists=${github_release_exists}"
          } >> "$GITHUB_OUTPUT"

          if [[ "$github_release_exists" == "true" ]]; then
            echo "GitHub release ${TAG} already exists; release creation will be skipped, but binary assets will still be rebuilt and uploaded."
          fi

      - name: Publish missing crates.io packages
        if: steps.published.outputs.missing_crates != ''
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ needs.gate.outputs.version }}
          MISSING_CRATES: ${{ steps.published.outputs.missing_crates }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "CARGO_REGISTRY_TOKEN secret is required to publish crates." >&2
            exit 1
          fi

          crate_exists() {
            local crate="$1"
            curl --fail --silent --show-error \
              "https://crates.io/api/v1/crates/${crate}/${VERSION}" \
              >/dev/null 2>&1
          }

          publish_crate() {
            local crate="$1"
            if crate_exists "$crate"; then
              echo "${crate} ${VERSION} already exists on crates.io; skipping."
              return
            fi

            for attempt in 1 2 3 4 5; do
              publish_log="$(mktemp)"
              if cargo publish --package "$crate" --locked 2>&1 | tee "$publish_log"; then
                rm -f "$publish_log"
                return
              fi

              if grep -Fq "already exists on crates.io index" "$publish_log"; then
                echo "${crate} ${VERSION} already exists on crates.io; skipping."
                rm -f "$publish_log"
                return
              fi

              rm -f "$publish_log"

              if crate_exists "$crate"; then
                echo "${crate} ${VERSION} was published by a previous attempt."
                return
              fi

              if [[ "$attempt" == "5" ]]; then
                break
              fi

              echo "cargo publish failed for ${crate} on attempt ${attempt}; retrying after crates.io index propagation."
              sleep 30
            done

            echo "Failed to publish ${crate} ${VERSION} after 5 attempts." >&2
            exit 1
          }

          for crate in $MISSING_CRATES; do
            publish_crate "$crate"
          done

      - name: Create GitHub release
        if: steps.published.outputs.github_release_exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.gate.outputs.tag }}
          VERSION: ${{ needs.gate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          release_flags=()
          if [[ "$VERSION" == *"-"* ]]; then
            release_flags+=(--prerelease)
          fi

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag \
            "${release_flags[@]}"

  upload-cli-assets:
    name: Upload CLI Assets
    needs: [gate, publish-crates-and-release]
    if: needs.gate.outputs.should_publish == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10

    steps:
      - name: Download CLI workflow artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: aureline-*
          path: dist-download

      - name: Verify and upload CLI release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.gate.outputs.tag }}
          VERSION: ${{ needs.gate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find dist-download -maxdepth 3 -type f -exec cp {} dist/ \;

          expected=(
            "aureline-${VERSION}-x86_64-unknown-linux-musl.tar.gz"
            "aureline-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
            "aureline-${VERSION}-aarch64-unknown-linux-musl.tar.gz"
            "aureline-${VERSION}-aarch64-apple-darwin.tar.gz"
            "aureline-${VERSION}-x86_64-pc-windows-msvc.zip"
          )

          mapfile -t actual < <(find dist -maxdepth 1 -type f -printf '%f\n' | sort)
          mapfile -t want < <(printf '%s\n' "${expected[@]}" | sort)

          if [[ "${actual[*]}" != "${want[*]}" ]]; then
            echo "Expected release assets:" >&2
            printf '%s\n' "${want[@]}" >&2
            echo "Actual release assets:" >&2
            printf '%s\n' "${actual[@]}" >&2
            exit 1
          fi

          gh release upload "$TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
