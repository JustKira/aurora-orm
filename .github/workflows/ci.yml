name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_TARGET_DIR: ${{ github.workspace }}/.cargo-target

jobs:
  verify:
    name: Verify
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Moon Toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Restore Cargo cache
        id: restore-cargo
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            .cargo-target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-${{ github.sha }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-
            cargo-${{ runner.os }}-

      - name: Restore Bun cache
        id: restore-bun
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            aureline-tree-sitter/node_modules
            aureline-docs/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json', 'aureline-tree-sitter/package.json', 'aureline-docs/bun.lock', 'aureline-docs/package.json') }}-${{ github.sha }}
          restore-keys: |
            bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json', 'aureline-tree-sitter/package.json', 'aureline-docs/bun.lock', 'aureline-docs/package.json') }}-
            bun-${{ runner.os }}-

      - name: Run format
        run: moon ci '*:fmt'

      - name: Run lint
        run: moon ci '*:clippy'

      - name: Run checks
        run: moon ci '*:check' docs:typecheck tree-sitter:generated-check

      - name: Run tests
        run: moon ci '*:test' tree-sitter:test

      - name: Save Cargo cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            .cargo-target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-${{ github.sha }}-${{ github.run_attempt }}

      - name: Save Bun cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            aureline-tree-sitter/node_modules
            aureline-docs/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json', 'aureline-tree-sitter/package.json', 'aureline-docs/bun.lock', 'aureline-docs/package.json') }}-${{ github.sha }}-${{ github.run_attempt }}

  release-tag:
    name: Check Release Tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - verify
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      has_release_tag: ${{ steps.release-tag.outputs.has_release_tag }}
      release_tag: ${{ steps.release-tag.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for release tag
        id: release-tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch --force --tags origin
          release_tag="$(git tag --points-at HEAD --list 'v*' | sort -V | tail -n 1)"

          if [[ -n "$release_tag" ]]; then
            echo "Found release tag ${release_tag}; release build should run."
            echo "has_release_tag=true" >> "$GITHUB_OUTPUT"
            echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          else
            echo "No v* tag points at this main commit; skipping release build."
            echo "has_release_tag=false" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
          fi

  build-release:
    name: Build Release
    if: needs.release-tag.outputs.has_release_tag == 'true'
    needs:
      - verify
      - release-tag
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Moon Toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Restore Cargo cache
        id: restore-cargo
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            .cargo-target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-${{ github.sha }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-
            cargo-${{ runner.os }}-

      - name: Restore Bun cache
        id: restore-bun
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            aureline-tree-sitter/node_modules
            aureline-docs/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json', 'aureline-tree-sitter/package.json', 'aureline-docs/bun.lock', 'aureline-docs/package.json') }}-${{ github.sha }}
          restore-keys: |
            bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json', 'aureline-tree-sitter/package.json', 'aureline-docs/bun.lock', 'aureline-docs/package.json') }}-
            bun-${{ runner.os }}-

      - name: Run release build
        run: moon ci :build-release

      - name: Save Cargo cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            .cargo-target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-${{ github.sha }}-release-${{ github.run_attempt }}

      - name: Save Bun cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            aureline-tree-sitter/node_modules
            aureline-docs/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json', 'aureline-tree-sitter/package.json', 'aureline-docs/bun.lock', 'aureline-docs/package.json') }}-${{ github.sha }}-release-${{ github.run_attempt }}
