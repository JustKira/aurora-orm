name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  verify:
    name: Moon Verify
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Moon Toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache Bun
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            aureline-tree-sitter/node_modules
            aureline-docs/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json', 'aureline-tree-sitter/package.json', 'aureline-docs/bun.lock', 'aureline-docs/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Run Moon CI
        run: |
          moon ci \
            repo:fmt \
            repo:check \
            repo:clippy \
            repo:test \
            repo:build-release \
            repo:cli-install \
            tree-sitter:generated-check \
            tree-sitter:test \
            docs:typecheck
