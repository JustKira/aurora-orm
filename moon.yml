$schema: 'https://moonrepo.dev/schemas/project.json'

language: rust
layer: application

env:
  CARGO_TERM_COLOR: always

# The root project owns full-workspace verification with Cargo workspace
# commands. Per-crate inherited Rust tasks stay available for local targeted
# runs, but CI uses these workspace-* tasks to avoid parallel Cargo fanout.
workspace:
  inheritedTasks:
    include: []

fileGroups:
  rust-sources:
    - 'aureline-*/src/**/*.rs'
    - 'aureline-*/tests/**/*.rs'
    - 'aureline-*/benches/**/*.rs'
    - 'aureline-*/Cargo.toml'
    - 'Cargo.toml'
    - 'Cargo.lock'
  rust-config:
    - 'rust-toolchain.toml'
    - 'rustfmt.toml'

tasks:
  workspace-format:
    command: 'cargo'
    args:
      - 'fmt'
      - '--all'
      - '--check'
    inputs:
      - '@group(rust-sources)'
      - '@group(rust-config)'

  workspace-check:
    command: 'cargo'
    args:
      - 'check'
      - '--workspace'
      - '--all-targets'
      - '--all-features'
      - '--locked'
    inputs:
      - '@group(rust-sources)'
      - '@group(rust-config)'

  workspace-lint:
    command: 'cargo'
    args:
      - 'clippy'
      - '--workspace'
      - '--all-targets'
      - '--all-features'
      - '--locked'
      - '--'
      - '-D'
      - 'warnings'
    inputs:
      - '@group(rust-sources)'
      - '@group(rust-config)'

  workspace-test:
    command: 'cargo'
    args:
      - 'test'
      - '--workspace'
      - '--all-targets'
      - '--all-features'
      - '--locked'
    inputs:
      - '@group(rust-sources)'
      - '@group(rust-config)'

  build-release:
    command: 'cargo'
    args:
      - 'build'
      - '--package'
      - 'aureline-core'
      - '--package'
      - 'aureline-cli'
      - '--release'
      - '--locked'
    inputs:
      - '@group(rust-sources)'
      - '@group(rust-config)'
    outputs:
      - 'target/release/aureline'
